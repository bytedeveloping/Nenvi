name: 'Testnode'
description: 'Starts a Node.js application on a custom localhost port and verifies it is running.'
author: 'Your Name'
branding:
  icon: 'play'
  color: 'green'

inputs:
  entry_file:
    description: 'The main entry file of the Node application'
    required: false
    default: 'app.js'
  port:
    description: 'The port the application listens on'
    required: false
    default: '3000'

runs:
  using: 'node20'
  main: 'dist/index.js'
