name: "Testnode"
description: "Run a Node.js server during GitHub Actions workflows."
author: "bytedeveloping"

branding:
  icon: "server"
  color: "blue"

inputs:
  entry_file:
    description: "Path to the Node.js entry file."
    required: true
    default: "index.js"

  port:
    description: "Port to run the server on."
    required: true
    default: "3000"

runs:
  using: "composite"
  steps:

    - name: Validate entry file exists
      shell: bash
      run: |
        if [ ! -f "${{ inputs.entry_file }}" ]; then
          echo "❌ Entry file not found: ${{ inputs.entry_file }}"
          exit 1
        fi
        echo "✔ Entry file found: ${{ inputs.entry_file }}"

    - name: Start Node server
      shell: bash
      env:
        PORT: ${{ inputs.port }}
      run: |
        echo "Starting Node server on port $PORT..."
        nohup node "${{ inputs.entry_file }}" > server.log 2>&1 &
        echo $! > node_server.pid
        echo "✔ Node server started in background (PID: $(cat node_server.pid))"

    - name: Wait for server to boot
      shell: bash
      run: |
        echo "Waiting for server to start..."
        sleep 3
        echo "✔ Server should now be running."

    - name: Show server log (optional)
      shell: bash
      run: |
        echo "---- Server Log ----"
        tail -n 20 server.log || true
