<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YAY</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0fdf4;
            font-family: 'Arial Black', sans-serif;
            overflow-wrap: break-word;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            color: #16a34a;
            font-size: 4vw;
            text-align: center;
            line-height: 1.2;
            letter-spacing: 2px;
            animation: pop 0.5s ease-in-out infinite alternate;
        }
        @keyframes pop {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }
    </style>
</head>
<body>
    <h1>YYAAYY</h1>
</body>
</html>
